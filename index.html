<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Dee Pro - Cloud Edition</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --text: #ffffff;
            --primary: #00a2ff; --accent: #ffcc00; --danger: #ff3e3e; --success: #00ff88;
            --border: #333;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 10px; margin: 0; }
        .header { width: 100%; max-width: 1200px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 12px; margin: 0 auto 15px auto; gap: 10px; }
        .config-bar { background: #001a33; padding: 10px; border-radius: 10px; display: flex; gap: 12px; border: 1px solid var(--primary); }
        .config-input { background: #000; border: 1px solid var(--primary); color: var(--primary); font-weight: bold; text-align: center; border-radius: 4px; padding: 3px; width: 60px; }
        @media (min-width: 768px) { .main-layout { display: grid; grid-template-columns: 340px 1fr; gap: 20px; } }
        .main-layout { width: 100%; max-width: 1200px; margin: 0 auto; }
        .panel { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .sticky { position: sticky; top: 15px; }
        label { display: block; font-size: 0.65em; color: #aaa; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
        input { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 8px; outline: none; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .calc-preview { background: #1a1500; padding: 12px; border-radius: 10px; margin: 10px 0; border: 1px solid var(--accent); color: var(--accent); }
        .line { display: flex; justify-content: space-between; font-weight: bold; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        .btn-buy { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 8px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .cloud-zone { display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
        .btn-cloud { flex: 1; background: #0a1f33; border: 1px solid var(--primary); color: var(--primary); padding: 10px; border-radius: 8px; font-size: 0.8em; font-weight: bold; cursor: pointer; }
        .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        @media (min-width: 900px) { .summary-grid { grid-template-columns: repeat(3, 1fr); } }
        .stat-card { background: #111; padding: 12px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-label { font-size: 0.6em; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 1.15em; font-weight: 900; }
        .card-profit { border: 2px solid var(--success); color: var(--success); background: #001a0d; }
        .search-input { border: 2px solid var(--primary); background: #000; padding: 12px; margin-bottom: 15px; width: 100%; box-sizing: border-box; color: white; border-radius: 8px; }
        .job-card { background: #1a1a1a; padding: 12px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #333; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .job-card.type-purchase { border-left: 5px solid var(--danger); background: #1a0a0a; }
        .job-card.type-print { border-left: 5px solid var(--primary); }
        .job-info { flex: 1; min-width: 0; }
        .job-name { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .job-date { font-size: 0.7em; color: #555; }
        .job-data { display: flex; gap: 15px; font-size: 0.85em; text-align: center; }
        .data-item { display: flex; flex-direction: column; min-width: 50px; }
        .data-label { font-size: 0.5em; color: #666; text-transform: uppercase; }
        .job-profit { font-weight: 900; font-size: 1.1em; min-width: 70px; text-align: right; }
        .btn-del { background: none; border: 1px solid #444; color: #444; cursor: pointer; padding: 5px 8px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size:1.4em; color:var(--primary);">3Dee <span style="color:#fff">PRO</span></h1>
    <div class="config-bar">
        <div><label>€/KG</label><input type="number" id="cfg_fil" value="19" class="config-input"></div>
        <div><label>€/KWH</label><input type="number" id="cfg_ele" value="0.19" class="config-input"></div>
    </div>
</div>

<div class="main-layout">
    <div class="side-panels">
        <div class="panel sticky">
            <h2 style="color:var(--primary); font-size: 1.1em; margin-top:0;">✚ NOVÁ TLAČ</h2>
            <label>Názov Projektu</label>
            <input type="text" id="in_name" placeholder="Názov...">
            <div class="row">
                <div><label>Váha/ks (g)</label><input type="number" id="in_w"></div>
                <div><label>Počet ks</label><input type="number" id="in_count" value="1"></div>
            </div>
            <div class="row">
                <div><label>Hodiny</label><input type="number" id="in_h"></div>
                <div><label>Minúty</label><input type="number" id="in_m"></div>
            </div>
            <label>Predajná cena / 1 ks (€)</label>
            <input type="number" id="in_price_per">
            <div class="calc-preview">
                <div class="line"><span>MATERIÁL:</span> <span id="view_total_w">0 g</span></div>
                <div class="line" style="font-size: 1.1em"><span>ZISK:</span> <span id="view_total_profit">0.00 €</span></div>
            </div>
            <button class="btn-add" onclick="saveItem()">ULOŽIŤ DO HISTÓRIE</button>
            <button class="btn-buy" onclick="addPurchase()">🛒 PRIDAŤ NÁKUP</button>
            <div class="cloud-zone">
                <button class="btn-cloud" onclick="handleCloud('backup')">☁️ Zálohovať</button>
                <button class="btn-cloud" onclick="handleCloud('restore')">⬇️ Obnoviť</button>
            </div>
        </div>
    </div>

    <div>
        <div class="summary-grid">
            <div class="stat-card"><div class="stat-label">Vytlačené</div><div class="stat-value" id="total_kg_ever">0.00 kg</div></div>
            <div class="stat-card"><div class="stat-label">Čas Tlače</div><div class="stat-value" id="total_time_ever">0h 0m</div></div>
            <div class="stat-card card-spent"><div class="stat-label">Investície</div><div class="stat-value" id="total_spent_mat">0.00 €</div></div>
            <div class="stat-card card-profit"><div class="stat-label">Čistý Zisk</div><div class="stat-value" id="stat_profit">0.00 €</div></div>
        </div>
        <input type="text" id="search_input" class="search-input" placeholder="🔍 Vyhľadať v načítaných dátach..." oninput="refreshUI()">
        <div id="list_container" style="text-align:center; padding:40px; color:#444; border:2px dashed #222; border-radius:15px;">
            Žiadne dáta v pamäti.<br>Pre zobrazenie klikni na <b>Obnoviť</b>.
        </div>
    </div>
</div>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbx-NoHXuzfx7EVN1ZeY2W4nUmj6RS1JKZylLEabzdFueGmgpAiBPWgOZiNxfHxRjaHN/exec";
    const MOJE_HESLO = "9988"; 
    
    // PRI ŠTARTE VŽDY PRÁZDNE
    let items = []; 
    const WATT_USAGE = 0.12; 

    // OVERENIE HESLA LEN PRE CLOUD
    function checkAuth() {
        let p = prompt("Zadaj heslo pre prístup ku cloudu:");
        return p === MOJE_HESLO;
    }

    const inputs = ['in_w', 'in_count', 'in_h', 'in_m', 'in_price_per', 'cfg_fil', 'cfg_ele'];
    inputs.forEach(id => document.getElementById(id).addEventListener('input', updatePreview));

    function updatePreview() {
        const w1 = parseFloat(document.getElementById('in_w').value) || 0;
        const count = parseInt(document.getElementById('in_count').value) || 1;
        const h1 = parseFloat(document.getElementById('in_h').value) || 0;
        const m1 = parseFloat(document.getElementById('in_m').value) || 0;
        const pricePer = parseFloat(document.getElementById('in_price_per').value) || 0;
        const fPrice = parseFloat(document.getElementById('cfg_fil').value) || 19;
        const ePrice = parseFloat(document.getElementById('cfg_ele').value) || 0.19;

        const totalW = w1 * count;
        const totalMins = (h1 * 60 + m1) * count;
        const totalCost = ((totalW / 1000) * fPrice) + ((totalMins / 60) * WATT_USAGE * ePrice);
        const totalSell = pricePer * count;
        const totalProfit = totalSell - totalCost;

        document.getElementById('view_total_w').innerText = totalW.toFixed(1) + " g";
        document.getElementById('view_total_profit').innerText = totalProfit.toFixed(2) + " €";
        return { totalCost, totalW, totalMins, count, totalSell, totalProfit };
    }

    function saveItem() {
        const name = document.getElementById('in_name').value.trim();
        if(!name || !document.getElementById('in_w').value) return alert("Doplň názov a váhu!");
        const c = updatePreview();
        const dateStr = new Date().toLocaleString('sk-SK', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
        items.unshift({ id: Date.now(), type: 'print', name: name, sell: c.totalSell, totalW: c.totalW, mins: c.totalMins, cost: c.totalCost, profit: c.totalProfit, count: c.count, date: dateStr });
        refreshUI();
    }

    function addPurchase() {
        const pStr = prompt("Cena nákupu (€):"); if(!pStr) return;
        const wStr = prompt("Váha (kg):"); if(!wStr) return;
        items.unshift({ id: Date.now(), type: 'buy', name: `Nákup Filamentu (${wStr}kg)`, sell: 0, cost: parseFloat(pStr), profit: -parseFloat(pStr), count: parseFloat(wStr), date: new Date().toLocaleString('sk-SK', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) });
        refreshUI();
    }

    async function handleCloud(action) {
        if (!checkAuth()) return alert("Nesprávne heslo!");
        
        if (action === 'backup') {
            try {
                await fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(items) });
                alert("✅ Záloha úspešná!");
            } catch(e) { alert("❌ Chyba!"); }
        } else {
            try {
                const res = await fetch(CLOUD_URL);
                items = await res.json();
                refreshUI();
                alert("✅ Dáta načítané!");
            } catch(e) { alert("❌ Chyba!"); }
        }
    }

    function deleteItem(id) {
        items = items.filter(i => i.id !== id);
        refreshUI();
    }

    function refreshUI() {
        const container = document.getElementById('list_container');
        const query = document.getElementById('search_input').value.toLowerCase();
        container.innerHTML = '';
        
        if (items.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px; color:#444; border:2px dashed #222; border-radius:15px;">Žiadne dáta v pamäti.<br>Pre zobrazenie klikni na <b>Obnoviť</b>.</div>';
        }

        let tProfit = 0, tKg = 0, tMins = 0, tSpentBuy = 0;
        
        items.forEach(i => {
            if(!i.name.toLowerCase().includes(query)) return;
            tProfit += i.profit;
            if(i.type === 'print') { tKg += i.totalW; tMins += i.mins; } else { tSpentBuy += i.cost; }
            
            const div = document.createElement('div');
            div.className = `job-card type-${i.type}`;
            div.innerHTML = `
                <div class="job-info"><span class="job-name">${i.name}</span><span class="job-date">${i.date}</span></div>
                <div class="job-data">
                    <div class="data-item"><span class="data-label">Váha</span>${i.type==='print'?i.totalW.toFixed(0)+'g':i.count+'kg'}</div>
                    <div class="data-item"><span class="data-label">Náklad</span>${i.cost.toFixed(1)}€</div>
                </div>
                <div class="job-profit" style="color:${i.profit>=0?'#00ff88':'#ff3e3e'}">${i.profit.toFixed(2)}€</div>
                <button class="btn-del" onclick="deleteItem(${i.id})">🗑</button>
            `;
            container.appendChild(div);
        });
        document.getElementById('stat_profit').innerText = tProfit.toFixed(2) + " €";
        document.getElementById('total_kg_ever').innerText = (tKg / 1000).toFixed(2) + " kg";
        document.getElementById('total_time_ever').innerText = Math.floor(tMins/60) + "h " + (tMins%60) + "m";
        document.getElementById('total_spent_mat').innerText = tSpentBuy.toFixed(2) + " €";
    }
</script>
</body>
</html>
