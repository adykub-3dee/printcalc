<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Dee Pro - Cloud & Business</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --text: #ffffff;
            --primary: #00a2ff; --accent: #ffcc00; --danger: #ff3e3e; --success: #00ff88;
            --border: #333; --cp-color: #aaa;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 10px; margin: 0; }
        
        .header { width: 100%; max-width: 1200px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 12px; margin: 0 auto 15px auto; gap: 10px; }
        .header-center { flex-grow: 1; text-align: center; }
        #live-clock { font-size: 1.8em; font-weight: 900; color: #fff; margin-bottom: 2px; }
        #live-date { font-size: 0.85em; color: var(--primary); text-transform: uppercase; font-weight: bold; }
        
        .config-bar { background: #001a33; padding: 10px; border-radius: 10px; display: flex; gap: 12px; border: 1px solid var(--primary); }
        .config-input { background: #000; border: 1px solid var(--primary); color: var(--primary); font-weight: bold; text-align: center; border-radius: 4px; padding: 3px; width: 60px; }

        .main-layout { width: 100%; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .main-layout { grid-template-columns: 340px 1fr; } }

        .panel { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); }
        .sticky { position: sticky; top: 15px; }

        label { display: block; font-size: 0.65em; color: #aaa; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
        input { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 8px; outline: none; }
        
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .status-toggle { display: flex; background: #000; border-radius: 8px; border: 1px solid #444; margin-bottom: 15px; overflow: hidden; }
        .st-btn { flex: 1; padding: 10px; text-align: center; font-weight: bold; cursor: pointer; font-size: 0.8em; transition: 0.2s; color: #555; }
        .st-btn.active { color: #000; }
        .st-btn-cp.active { background: var(--cp-color); }
        .st-btn-ok.active { background: var(--success); }

        .calc-preview { background: #1a1500; padding: 12px; border-radius: 10px; margin: 10px 0; border: 1px solid var(--accent); color: var(--accent); }
        .line { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 5px; }
        .input-inline { background: rgba(255, 204, 0, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 4px 8px; border-radius: 4px; width: 85px; text-align: right; font-weight: bold; }

        .btn-add { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        .btn-edit-mode { background: var(--accent); color: #000; }
        .btn-buy { background: transparent; color: var(--success); border: 1px solid var(--success); padding: 8px; width: 100%; border-radius: 10px; margin-top: 10px; cursor: pointer; font-weight: bold; }

        .cloud-zone { display: flex; gap: 10px; margin-top: 20px; padding-top: 15px; border-top: 1px solid #333; }
        .btn-cloud { flex: 1; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 0.8em; }
        .btn-backup { background: #0044cc; color: white; }
        .btn-restore { background: #333; color: white; border: 1px solid #555; }

        .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        @media (min-width: 900px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .stat-card { background: #111; padding: 12px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-label { font-size: 0.6em; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 1.1em; font-weight: 900; }
        .card-spent { color: var(--danger); border-bottom: 2px solid var(--danger); }
        .card-profit { border: 2px solid var(--success); color: var(--success); background: #001a0d; }

        .search-input { width: 100%; background: #111; border: 2px solid var(--primary); color: white; padding: 12px; border-radius: 10px; font-weight: bold; box-sizing: border-box; margin-bottom: 15px; }

        /* JOB CARD & LAYOUT */
        .job-card { background: #1a1a1a; padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #333; display: flex; align-items: center; gap: 15px; justify-content: space-between; flex-wrap: wrap; transition: all 0.3s ease; }
        .job-card.is-editing { border: 2px solid var(--accent) !important; background: #252000; box-shadow: 0 0 15px rgba(255, 204, 0, 0.2); }
        .job-card.is-cp { border: 1px dashed var(--cp-color); opacity: 0.7; background: #111; }
        .type-buy { border-left: 5px solid var(--danger); }
        .type-print { border-left: 5px solid var(--primary); }
        .is-cp.type-print { border-left: 5px solid var(--cp-color); }

        .job-info { flex: 2; min-width: 180px; }
        .job-name { font-weight: bold; display: block; font-size: 1.1em; margin-bottom: 4px; }
        .job-tag { font-size: 0.6em; padding: 2px 5px; border-radius: 4px; margin-left: 5px; vertical-align: middle; }
        .tag-cp { background: #444; color: #fff; }
        .tag-ok { background: var(--success); color: #000; }

        .job-data { display: flex; gap: 15px; text-align: right; flex-grow: 1; justify-content: flex-end; }
        .data-item { display: flex; flex-direction: column; min-width: 85px; }
        .data-label { font-size: 0.65em; color: #666; text-transform: uppercase; font-weight: bold; }
        .data-val { font-size: 1.05em; font-weight: bold; white-space: nowrap; }
        .data-sub { font-size: 0.65em; color: #888; margin-top: 2px; }

        .job-profit { min-width: 80px; text-align: right; font-weight: 900; font-size: 1.3em; border-left: 1px solid #333; padding-left: 15px; }
        .profit-label { font-size: 0.45em; display: block; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        
        .actions { display: flex; gap: 5px; }
        .action-btn { background: #222; border: 1px solid #444; color: #aaa; cursor: pointer; padding: 8px; border-radius: 6px; transition: 0.3s; }
        .action-btn.active-status { background: var(--success); color: #000; border-color: var(--success); }
        
        /* ANIMÁCIA PRE EDIT TLAČIDLO */
        .action-btn.is-active-edit { 
            background: var(--accent) !important; 
            color: #000 !important; 
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent);
            animation: pulse-edit 1.5s infinite;
        }

        @keyframes pulse-edit {
            0% { box-shadow: 0 0 5px var(--accent); }
            50% { box-shadow: 0 0 18px var(--accent); }
            100% { box-shadow: 0 0 5px var(--accent); }
        }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size:1.4em; color:var(--primary);">3Dee <span style="color:#fff">PRO</span></h1>
    <div class="header-center">
        <div id="live-clock">--:--:--</div>
        <div id="live-date">--.--.----</div>
    </div>
    <div class="config-bar">
        <div><label>€/KG</label><input type="number" id="cfg_fil" value="19" class="config-input"></div>
        <div><label>€/KWH</label><input type="number" id="cfg_ele" value="0.19" class="config-input"></div>
    </div>
</div>

<div class="main-layout">
    <div class="side-panels">
        <div class="panel sticky">
            <h2 id="form_title" style="color:var(--primary); font-size: 1.1em; margin-bottom: 15px;">✚ NOVÁ TLAČ</h2>
            
            <label>Typ záznamu</label>
            <div class="status-toggle">
                <div id="st_cp" class="st-btn st-btn-cp" onclick="setStatus('cp')">CP (Ponuka)</div>
                <div id="st_ok" class="st-btn st-btn-ok active" onclick="setStatus('ok')">OK (Výroba)</div>
            </div>

            <label>Názov Projektu</label>
            <input type="text" id="in_name" placeholder="Názov...">
            <div class="row">
                <div><label>Váha/ks (g)</label><input type="number" id="in_w" step="any"></div>
                <div><label>Počet ks</label><input type="number" id="in_count" value="1"></div>
            </div>
            <div class="row">
                <div><label>Hodiny</label><input type="number" id="in_h"></div>
                <div><label>Minúty</label><input type="number" id="in_m"></div>
            </div>
            <label>Predajná cena / 1 ks (€)</label>
            <input type="number" id="in_price_per" step="any">
            
            <div class="calc-preview">
                <div class="line"><span>MATERIÁL SPOLU:</span> <span id="view_total_w">0 g</span></div>
                <div class="line">
                    <span>NÁKLAD (€):</span> 
                    <input type="number" id="view_total_cost" class="input-inline" step="any" value="0.00" oninput="updatePreview(false)">
                </div>
                <div class="line" style="border-top: 1px solid #444; padding-top: 5px; font-size: 1.1em;">
                    <span>ČISTÝ ZISK:</span> <span id="view_total_profit">0.00 €</span>
                </div>
            </div>
            
            <button class="btn-add" id="btn_save" onclick="saveItem()">ULOŽIŤ DO HISTÓRIE</button>
            <button id="btn_cancel" onclick="clearForm()" style="display:none; background:#333; border:1px solid #444; color:#fff; padding:10px; border-radius:10px; width:100%; margin-top:10px; cursor:pointer; font-weight:bold;">✖ ZRUŠIŤ ÚPRAVU</button>
            <button class="btn-buy" id="btn_other" onclick="addOtherItem()">✚ NÁKUP / INÉ VÝDAVKY</button>

            <div class="cloud-zone">
                <button class="btn-cloud btn-backup" id="btn_backup" onclick="handleCloud('backup')">☁️ ZÁLOHOVAŤ</button>
                <button class="btn-cloud btn-restore" id="btn_restore" onclick="handleCloud('restore')">⬇️ OBNOVIŤ</button>
            </div>
        </div>
    </div>

    <div>
        <div class="summary-grid">
            <div class="stat-card"><div class="stat-label">Vytlačené (OK)</div><div class="stat-value" id="total_kg_ever">0.00 kg</div></div>
            <div class="stat-card"><div class="stat-label">Čas Tlače (OK)</div><div class="stat-value" id="total_time_ever">0h 0m</div></div>
            <div class="stat-card"><div class="stat-label">Zákazky</div><div class="stat-value" id="stat_count">0</div></div>
            <div class="stat-card"><div class="stat-label">Obrat</div><div class="stat-value" id="stat_obrat">0.00 €</div></div>
            <div class="stat-card card-spent"><div class="stat-label">Materiál</div><div class="stat-value" id="total_mat_cost">0.00 €</div></div>
            <div class="stat-card card-spent"><div class="stat-label">Elektrina</div><div class="stat-value" id="total_ele_cost">0.00 €</div></div>
            <div class="stat-card card-spent"><div class="stat-label">Iné Extra</div><div class="stat-value" id="total_spent_other">0.00 €</div></div>
            <div class="stat-card card-profit"><div class="stat-label" style="color:var(--success)">Čistý Zisk</div><div class="stat-value" id="stat_profit">0.00 €</div></div>
        </div>

        <input type="text" id="search_input" class="search-input" placeholder="🔍 Vyhľadať v histórii..." oninput="refreshUI()">
        <div id="list_container"></div>
    </div>
</div>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbx3vsb_QIA1Y6bqjifYNDSNaLasMrBIlNe5jJwB4WwwYQItc5R_8qxCa_mAFZ_0t3RV/exec";

    let items = [];
    let editingId = null;
    let currentStatus = 'ok';

    function setStatus(s) {
        currentStatus = s;
        document.getElementById('st_cp').classList.toggle('active', s === 'cp');
        document.getElementById('st_ok').classList.toggle('active', s === 'ok');
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('sk-SK');
        document.getElementById('live-date').innerText = now.toLocaleDateString('sk-SK', {weekday:'long', day:'2-digit', month:'long'});
    }
    setInterval(updateClock, 1000); updateClock();

    async function handleCloud(action) {
        const zadaneHeslo = prompt("Zadajte heslo:");
        if(!zadaneHeslo) return;

        const btn = document.getElementById(action === 'backup' ? 'btn_backup' : 'btn_restore');
        const origText = btn.innerText;
        btn.innerText = "⏳...";
        
        try {
            if(action === 'backup') {
                const payload = { pass: zadaneHeslo, data: items };
                await fetch(CLOUD_URL, {method:'POST', mode:'no-cors', body: JSON.stringify(payload)});
                alert("Zálohované!");
            } else {
                const res = await fetch(`${CLOUD_URL}?pass=${encodeURIComponent(zadaneHeslo)}`);
                const data = await res.json();
                if (data.error) { alert("Chyba: " + data.error); } 
                else {
                    items = Array.isArray(data) ? data : (data.data || []);
                    refreshUI();
                    alert("Dáta obnovené!");
                }
            }
        } catch(e) { alert("Chyba spojenia!"); }
        btn.innerText = origText;
    }

    function updatePreview(auto = true) {
        const w = parseFloat(document.getElementById('in_w').value) || 0;
        const c = parseInt(document.getElementById('in_count').value) || 1;
        const h = parseFloat(document.getElementById('in_h').value) || 0;
        const m = parseFloat(document.getElementById('in_m').value) || 0;
        const p = parseFloat(document.getElementById('in_price_per').value) || 0;
        
        const f = parseFloat(document.getElementById('cfg_fil').value) || 19;
        const e = parseFloat(document.getElementById('cfg_ele').value) || 0.19;

        const totalW = w * c;
        const totalMins = (h * 60 + m) * c;
        
        const matC = (totalW / 1000) * f;
        const eleC = (totalMins / 60) * 0.12 * e;

        if(auto) document.getElementById('view_total_cost').value = (matC + eleC).toFixed(2);
        
        const cost = parseFloat(document.getElementById('view_total_cost').value) || 0;
        document.getElementById('view_total_w').innerText = totalW.toFixed(0) + " g";
        document.getElementById('view_total_profit').innerText = (p * c - cost).toFixed(2) + " €";
        
        return { totalW, totalMins, matC, eleC, cost, totalSell: p * c, w, h, m, p };
    }

    ['in_w', 'in_count', 'in_h', 'in_m', 'in_price_per', 'cfg_fil', 'cfg_ele'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => updatePreview(true));
    });

    function saveItem() {
        const name = document.getElementById('in_name').value || "Bez názvu";
        const calc = updatePreview(false);
        const cnt = parseInt(document.getElementById('in_count').value) || 1;
        
        const newItem = {
            id: editingId || Date.now(),
            type: 'print',
            status: currentStatus,
            name: name,
            sell: Number(calc.totalSell),
            cost: Number(calc.cost),
            matCost: Number(calc.matC),
            eleCost: Number(calc.eleC),
            profit: Number(calc.totalSell - calc.cost),
            totalW: Number(calc.totalW),
            mins: Number(calc.totalMins),
            weight: Number(calc.w), h: Number(calc.h), m: Number(calc.m), 
            pricePer: Number(calc.p),
            costPer: Number(calc.cost / cnt),
            count: cnt,
            date: new Date().toLocaleString('sk-SK')
        };

        if(editingId) {
            items = items.map(i => i.id === editingId ? newItem : i);
        } else {
            items.unshift(newItem);
        }
        clearForm(); refreshUI();
    }

    function toggleItemStatus(id) {
        items = items.map(i => (i.id === id) ? { ...i, status: i.status === 'ok' ? 'cp' : 'ok' } : i);
        refreshUI();
    }

    function editItem(id) {
        const i = items.find(x => x.id === id); 
        if(!i) return;

        // Logika pre editáciu Nákupu/Iného výdavku
        if (i.type === 'buy') {
            const newName = prompt("Upraviť názov:", i.name);
            if (newName === null) return;
            
            // Zistíme aktuálnu hodnotu (ak profit < 0, bol to výdavok)
            const currentVal = (i.profit >= 0 ? i.sell : -i.cost).toString().replace('.', ',');
            const newValStr = prompt("Upraviť sumu (+ predaj, - výdavok):", currentVal);
            if (newValStr === null) return;

            const v = parseFloat(newValStr.replace(',', '.'));
            if (isNaN(v)) { alert("Neplatná suma!"); return; }

            items = items.map(item => item.id === id ? {
                ...item,
                name: newName,
                sell: v > 0 ? v : 0,
                cost: v < 0 ? Math.abs(v) : 0,
                profit: v
            } : item);
            refreshUI();
            return;
        }

        // Klasická logika pre editáciu Tlače
        if (editingId === id) { clearForm(); return; }
        editingId = id;
        setStatus(i.status || 'ok');
        document.getElementById('in_name').value = i.name;
        document.getElementById('in_w').value = i.weight || 0;
        document.getElementById('in_count').value = i.count || 1;
        document.getElementById('in_h').value = i.h || 0;
        document.getElementById('in_m').value = i.m || 0;
        document.getElementById('in_price_per').value = (i.pricePer || (i.sell/i.count)).toFixed(2);
        document.getElementById('view_total_cost').value = i.cost.toFixed(2);
        
        document.getElementById('form_title').innerText = "✎ UPRAVIŤ TLAČ";
        document.getElementById('btn_save').innerText = "ULOŽIŤ ZMENY";
        document.getElementById('btn_save').classList.add('btn-edit-mode');
        document.getElementById('btn_cancel').style.display = "block";
        document.getElementById('btn_other').style.display = "none";
        
        window.scrollTo({top: 0, behavior: 'smooth'});
        updatePreview(false);
        refreshUI();
    }

    function clearForm() {
        editingId = null;
        setStatus('ok');
        document.getElementById('in_name').value = '';
        document.getElementById('in_w').value = '';
        document.getElementById('in_h').value = '';
        document.getElementById('in_m').value = '';
        document.getElementById('in_price_per').value = '';
        document.getElementById('in_count').value = '1';
        document.getElementById('form_title').innerText = "✚ NOVÁ TLAČ";
        document.getElementById('btn_save').innerText = "ULOŽIŤ DO HISTÓRIE";
        document.getElementById('btn_save').classList.remove('btn-edit-mode');
        document.getElementById('btn_cancel').style.display = "none";
        document.getElementById('btn_other').style.display = "block";
        updatePreview(true);
        refreshUI();
    }

    function duplicateItem(id) {
        const i = items.find(x => x.id === id);
        items.unshift({...i, id: Date.now(), date: new Date().toLocaleString('sk-SK')});
        refreshUI();
    }

    function addOtherItem() {
        const n = prompt("Názov:"); if(!n) return;
        const valStr = prompt("Suma (+ predaj, - výdavok):");
        if(!valStr) return;
        const v = parseFloat(valStr.replace(',','.'));
        if(isNaN(v)) return;
        items.unshift({id:Date.now(), type:'buy', status:'ok', name:n, sell: v>0?v:0, cost: v<0?Math.abs(v):0, profit:v, date: new Date().toLocaleString('sk-SK')});
        refreshUI();
    }

    function deleteItem(id) { if(confirm("Zmazať?")) { items = items.filter(i => i.id !== id); if(editingId === id) clearForm(); refreshUI(); } }

    function refreshUI() {
        const container = document.getElementById('list_container');
        const query = document.getElementById('search_input').value.toLowerCase();
        container.innerHTML = '';
        
        let tObrat = 0, tProfit = 0, tKg = 0, tMins = 0, tMat = 0, tEle = 0, tOther = 0, okCount = 0;

        items.forEach(i => {
            if(query && !i.name.toLowerCase().includes(query)) return;
            
            const isCP = i.status === 'cp';
            const isEditing = editingId === i.id;
            const sell = Number(i.sell) || 0;
            const cost = Number(i.cost) || 0;
            const profit = sell - cost;
            const count = i.count || 1;

            if(!isCP) {
                tObrat += sell;
                tProfit += (i.type === 'buy' ? Number(i.profit) : profit);
                okCount++;

                if(i.type === 'print') {
                    tKg += (Number(i.totalW) || 0); 
                    tMins += (Number(i.mins) || 0);
                    const mC = Number(i.matCost) || 0; 
                    const eC = Number(i.eleCost) || 0;
                    tMat += mC; tEle += eC;
                    if(cost > (mC + eC + 0.01)) tOther += (cost - (mC + eC));
                } else if(profit < 0) {
                    tOther += Math.abs(profit);
                }
            }

            const details = i.type === 'print' ? `${(Number(i.totalW)||0).toFixed(0)}g | ${Math.floor((Number(i.mins)||0)/60)}h ${(Number(i.mins)||0)%60}m` : "Nákup / Výdavok";
            const costPer = (cost / count).toFixed(2);
            const sellPer = (sell / count).toFixed(2);

            container.innerHTML += `
                <div class="job-card type-${i.type} ${isEditing ? 'is-editing' : ''} ${isCP ? 'is-cp' : ''}">
                    <div class="job-info">
                        <span class="job-name">${i.name} <span class="job-tag ${isCP?'tag-cp':'tag-ok'}">${isCP?'CP':'OK'}</span></span>
                        <div style="font-size:0.75em; color:#aaa; font-weight:bold;">${details}</div>
                        <div style="font-size:0.70em; color:#666; margin-top:2px;">${i.date}</div>
                    </div>
                    
                    <div class="job-data">
                        <div class="data-item">
                            <span class="data-label">Náklad</span>
                            <span class="data-val" style="color:var(--danger)">${cost.toFixed(2)} €</span>
                            ${i.type==='print' ? `<span class="data-sub">${count}ks (${costPer} €/ks)</span>` : ''}
                        </div>
                        <div class="data-item">
                            <span class="data-label">Predaj</span>
                            <span class="data-val" style="color:var(--primary)">${sell.toFixed(2)} €</span>
                            ${i.type==='print' ? `<span class="data-sub">${count}ks (${sellPer} €/ks)</span>` : ''}
                        </div>
                    </div>

                    <div class="job-profit" style="color:${profit>=0?'var(--success)':'var(--danger)'}">
                        <span class="profit-label">Zisk</span>
                        ${profit.toFixed(2)}€
                    </div>

                    <div class="actions">
                        <button class="action-btn ${isCP?'':'active-status'}" title="Prepnúť" onclick="toggleItemStatus(${i.id})">${isCP?'CP':'OK'}</button>
                        <button class="action-btn" onclick="duplicateItem(${i.id})">❐</button>
                        <button class="action-btn ${isEditing ? 'is-active-edit' : ''}" onclick="editItem(${i.id})">✎</button>
                        <button class="action-btn" onclick="deleteItem(${i.id})">🗑</button>
                    </div>
                </div>`;
        });

        document.getElementById('stat_count').innerText = okCount;
        document.getElementById('stat_obrat').innerText = tObrat.toFixed(2) + " €";
        document.getElementById('stat_profit').innerText = tProfit.toFixed(2) + " €";
        document.getElementById('total_kg_ever').innerText = (tKg/1000).toFixed(2) + " kg";
        document.getElementById('total_time_ever').innerText = Math.floor(tMins/60) + "h " + (tMins%60) + "m";
        document.getElementById('total_mat_cost').innerText = tMat.toFixed(2) + " €";
        document.getElementById('total_ele_cost').innerText = tEle.toFixed(2) + " €";
        document.getElementById('total_spent_other').innerText = tOther.toFixed(2) + " €";
    }
</script>
</body>
</html>
